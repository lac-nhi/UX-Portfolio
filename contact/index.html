<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Lac Nhi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body id="top">
  <header class="site-header">
    <a href="/" class="logo" aria-label="Lac Nhi home">
      <img src="/assets/ln-logo.png" alt="LN logo" class="brand-logo">
    </a>
    <nav class="nav" aria-label="Main">
      <ul class="nav-list">
        <li><a href="/#projects">Work</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/assets/LN-UX-Resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a></li>
        <li><a href="/contact/" aria-current="page">Contact</a></li>
      </ul>
      <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero contact-hero" aria-labelledby="resume-heading">
      <div class="hero-content">
        <div class="contact-hero-layout">
          <div class="contact-hero-left">
            <img
              class="contact-hero-image"
              src="/assets/Love_Lock_Image-fd54f9c2-982f-4016-a072-fdc741077cf3.png"
              alt="Love locks collage"
              loading="eager"
              decoding="async"
            />
            <p class="contact-hero-caption">📍Love Locks @ N Seoul Tower (Namsan Tower)</p>
          </div>

          <div class="contact-hero-right">
            <div class="contact-sparkle-frame">
              <div class="hero-sparkles hero-sparkles-left" aria-hidden="true"></div>
              <div class="hero-sparkles hero-sparkles-right" aria-hidden="true"></div>
              <h1 id="resume-heading" aria-label="Let's get in touch!">
                <span class="visually-hidden">Let's get in touch!</span>
                <span class="contact-heading-letters" aria-hidden="true">
                  <span class="hero-scroll-letter" style="--i: 0">L</span><span class="hero-scroll-letter" style="--i: 1">e</span><span class="hero-scroll-letter" style="--i: 2">t</span><span class="hero-scroll-letter" style="--i: 3">'</span><span class="hero-scroll-letter" style="--i: 4">s</span><span class="hero-scroll-letter" style="--i: 5">&nbsp;</span><span class="hero-scroll-letter" style="--i: 6">g</span><span class="hero-scroll-letter" style="--i: 7">e</span><span class="hero-scroll-letter" style="--i: 8">t</span><span class="hero-scroll-letter" style="--i: 9">&nbsp;</span><span class="hero-scroll-letter" style="--i: 10">i</span><span class="hero-scroll-letter" style="--i: 11">n</span><span class="hero-scroll-letter" style="--i: 12">&nbsp;</span><span class="hero-scroll-letter" style="--i: 13">t</span><span class="hero-scroll-letter" style="--i: 14">o</span><span class="hero-scroll-letter" style="--i: 15">u</span><span class="hero-scroll-letter" style="--i: 16">c</span><span class="hero-scroll-letter" style="--i: 17">h</span><span class="hero-scroll-letter" style="--i: 18">!</span>
                </span>
              </h1>
              <div class="contact-social-links" aria-label="Social links">
                <a
                  class="contact-linkedin"
                  href="https://www.linkedin.com/in/lacnhi-nguyen/"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Open Lac Nhi's LinkedIn profile in a new tab"
                >
                  <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.852 3.37-1.852 3.6 0 4.266 2.369 4.266 5.455v6.288zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zM6.814 20.452H3.861V9h2.953v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                  </svg>
                </a>

                <a
                  class="contact-email"
                  href="mailto:nguyenlacnhi@gmail.com"
                  aria-label="Email nguyenlacnhi@gmail.com"
                >
                  <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <nav class="case-study-back-to-top-nav" aria-label="Back to top">
      <a href="#top" class="case-study-back-to-top">Back to the Top <span class="case-study-back-to-top-arrow" aria-hidden="true">↑</span></a>
    </nav>
    <nav class="site-footer-nav" aria-label="Footer">
      <ul class="site-footer-list">
        <li><a href="/#projects">Work</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/assets/LN-UX-Resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a></li>
        <li><a href="/contact/" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var navList = document.querySelector('.nav-list');
      if (toggle && navList) {
        toggle.addEventListener('click', function () {
          var open = navList.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', open);
        });
      }

      if (window.lottie) {
        var sparkleEls = document.querySelectorAll('.hero-sparkles');
        sparkleEls.forEach(function (sparkles) {
          var anim = lottie.loadAnimation({
            container: sparkles,
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: '/sparkle-animation.json',
            rendererSettings: {
              preserveAspectRatio: 'xMidYMid meet',
              progressiveLoad: true,
              hideOnTransparent: true,
            },
          });
          if (anim && anim.setSpeed) anim.setSpeed(0.85);
        });
      }
    })();
  </script>
</body>
</html>
