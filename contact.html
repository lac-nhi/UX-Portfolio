<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Lac Nhi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo" aria-label="Lac Nhi home">
      <img src="assets/ln-logo.png" alt="LN logo" class="brand-logo">
    </a>
    <nav class="nav" aria-label="Main">
      <ul class="nav-list">
        <li><a href="index.html#projects">Work</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
      <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero" aria-labelledby="resume-heading">
      <div class="hero-decoration hero-star hero-star-1" aria-hidden="true"></div>
      <div class="hero-decoration hero-star hero-star-2" aria-hidden="true"></div>
      <div class="hero-decoration hero-star hero-star-3" aria-hidden="true"></div>
      <div class="hero-decoration hero-star hero-star-4" aria-hidden="true"></div>

      <div class="hero-content">
        <h1 id="contact-heading">Contact</h1>
        <p class="hero-tagline">A snapshot of my experience, skills, and the teams and products I’ve supported.</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var navList = document.querySelector('.nav-list');
      if (!toggle || !navList) return;
      toggle.addEventListener('click', function () {
        var open = navList.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open);
      });
    })();
  </script>
</body>
</html>
